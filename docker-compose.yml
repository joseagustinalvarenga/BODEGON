services:
  app:
    build: .
    container_name: bodegon-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bodegon_db
      - SPRING_DATASOURCE_USERNAME=bodegon
      - SPRING_DATASOURCE_PASSWORD=bodegon_pass
      - JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437  # Example weak secret for dev
      - JWT_ACCESS_TTL=900000
      - JWT_REFRESH_TTL=604800000
    depends_on:
      - postgres
    networks:
      - bodegon-net

  postgres:
    image: postgres:16-alpine
    container_name: bodegon-db
    environment:
      - POSTGRES_DB=bodegon_db
      - POSTGRES_USER=bodegon
      - POSTGRES_PASSWORD=bodegon_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bodegon-net

volumes:
  postgres_data:

networks:
  bodegon-net:
    driver: bridge
